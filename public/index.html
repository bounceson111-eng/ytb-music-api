<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BoB Music | Full Stream</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .search-area { position: sticky; top: 0; background: #000; padding: 20px; z-index: 10; }
        input { padding: 15px; width: 60%; border-radius: 25px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 15px 25px; border-radius: 25px; border: none; background: #1DB954; color: #000; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #282828; transform: scale(1.05); }
        img { width: 100%; border-radius: 5px; }
        #player-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: #121212; border-top: 2px solid #1DB954; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="search-area">
        <h1>BoB FULL ENGINE 🎧</h1>
        <input type="text" id="query" placeholder="Artiste ou Musique (ex: Jul)...">
        <button onclick="searchFull()">SCAN</button>
    </div>

    <div id="results" class="grid"></div>

    <div id="player-container">
        <div id="yt-player"></div>
    </div>

    <script>
        async function searchFull() {
            const q = document.getElementById('query').value;
            const resDiv = document.getElementById('results');
            if(!q) return;

            resDiv.innerHTML = "Connexion sécurisée aux bases de données...";

            try {
                // Utilisation de l'API iTunes (Zéro blocage)
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=20&country=fr`);
                const data = await res.json();

                resDiv.innerHTML = "";
                data.results.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}">
                        <p><strong>${song.trackName}</strong><br><small>${song.artistName}</small></p>
                    `;
                    // Au clic, on cherche le son sur YouTube et on l'affiche
                    div.onclick = () => loadVideo(song.trackName + " " + song.artistName);
                    resDiv.appendChild(div);
                });
            } catch (e) {
                resDiv.innerHTML = "Erreur de scanner. Réessaie.";
            }
        }

        function loadVideo(searchTerm) {
            const container = document.getElementById('player-container');
            container.style.display = "block";
            
            // On utilise un moteur de recherche DuckDuckGo pour trouver l'ID YouTube sans API Key
            const ytSearchUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(searchTerm)}`;
            container.innerHTML = `<iframe src="${ytSearchUrl}&autoplay=1" allow="autoplay"></iframe>`;
        }
    </script>
</body>
</html>
