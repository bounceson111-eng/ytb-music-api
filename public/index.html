<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOB_STEALTH_CORE v4.0</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff00; padding: 20px; margin: 0; overflow-x: hidden; }
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; pointer-events: none; }
        .terminal-header { border-bottom: 2px solid #00ff00; padding: 10px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .input-zone { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; width: 60%; font-family: 'Courier New'; outline: none; box-shadow: 0 0 5px #00ff00; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00cc00; box-shadow: 0 0 15px #00ff00; }
        .console { background: rgba(0, 0, 0, 0.9); border: 1px solid #333; height: 180px; overflow-y: auto; padding: 15px; font-size: 0.85rem; margin-bottom: 20px; text-align: left; }
        .log-info { color: #00ff00; }
        .log-warn { color: #ffff00; }
        .log-error { color: #ff0000; font-weight: bold; text-decoration: underline; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .track-card { background: #111; border: 1px solid #222; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .track-card:hover { border-color: #00ff00; background: #1a1a1a; transform: translateY(-3px); }
        .track-card::after { content: "DECRYPT"; position: absolute; right: -20px; bottom: 5px; font-size: 0.6rem; opacity: 0.3; transform: rotate(-45deg); }
        audio { width: 100%; margin-top: 20px; filter: invert(1) hue-rotate(90deg); }
    </style>
</head>
<body>

    <div class="terminal-header">Target: YouTube_Database | Status: Bypassing_Firewall</div>

    <div class="input-zone">
        <input type="text" id="target" placeholder="[SCAN_QUERY] Entrez artiste ou titre...">
        <button onclick="initiateHack()">Execute Scan</button>
    </div>

    <div class="console" id="monitor">
        [SYS] En attente d'injection...<br>
        [NET] Proxy Vercel Edge : Operationnel.
    </div>

    <div id="results" class="results-grid"></div>
    
    <div style="position: sticky; bottom: 0; background: #000; padding: 10px; border-top: 1px solid #00ff00;">
        <audio id="streamer" controls></audio>
    </div>

    <script>
        const NODES = [
            "https://pipedapi.kavin.rocks",
            "https://api.piped.victr.me",
            "https://pipedapi.drgns.space",
            "https://pipedapi.moomoo.me"
        ];

        function monitor(msg, type = 'info') {
            const m = document.getElementById("monitor");
            const time = new Date().toLocaleTimeString();
            const cls = `log-${type}`;
            m.innerHTML += `<br><span class="${cls}">[${time}] ${msg}</span>`;
            m.scrollTop = m.scrollHeight;
        }

        async function initiateHack() {
            const query = document.getElementById("target").value;
            const resDiv = document.getElementById("results");
            if (!query) return;

            resDiv.innerHTML = "";
            monitor("Injection User-Agent: Mozilla/5.0 (Android 13; Mobile)...", "warn");
            monitor("Rotation d'IP via Nodes décentralisés...", "info");

            let success = false;

            for (let node of NODES) {
                monitor(`Tentative d'intrusion : ${node.split('//')[1]}`, "info");
                try {
                    const response = await fetch(`${node}/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                    
                    if (response.status === 403) {
                        monitor(`BLOCAGE DETECTE (403) : Node ${node} banni par YouTube.`, "error");
                        continue;
                    }

                    const data = await response.json();
                    if (data.items && data.items.length > 0) {
                        monitor(`FAILLE TROUVEE : ${data.items.length} paquets récupérés.`, "info");
                        displayData(data.items);
                        success = true;
                        break;
                    }
                } catch (e) {
                    monitor(`ECHEC CONNEXION : Node hors-ligne.`, "error");
                }
            }

            if (!success) {
                monitor("SYSTEM CRITICAL ERROR : YouTube a détecté le bypass. Attendre 300s.", "error");
            }
        }

        function displayData(items) {
            const resDiv = document.getElementById("results");
            items.forEach(item => {
                const card = document.createElement("div");
                card.className = "track-card";
                card.innerHTML = `<strong>${item.title}</strong><br><small>${item.uploaderName}</small>`;
                card.onclick = () => decryptStream(item.url.split("=")[1]);
                resDiv.appendChild(card);
            });
        }

        async function decryptStream(id) {
            monitor(`Déchiffrement du flux ID: ${id}...`, "warn");
            for (let node of NODES) {
                try {
                    const res = await fetch(`${node}/streams/${id}`);
                    const data = await res.json();
                    const audio = data.audioStreams.find(s => s.format === "M4A" || s.codec === "opus");
                    
                    if (audio) {
                        monitor("FLUX STABILISE : Lecture en cours.", "info");
                        const player = document.getElementById("streamer");
                        player.src = audio.url;
                        player.play();
                        return;
                    }
                } catch (e) {
                    monitor("Echec extraction, tentative node suivant...", "warn");
                }
            }
            monitor("ECHEC TOTAL : YouTube Signature V3 a bloqué ce titre.", "error");
        }
    </script>
</body>
</html>
