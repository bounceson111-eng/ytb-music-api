<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoB Music Player</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input { padding: 12px; width: 80%; border-radius: 25px; border: none; outline: none; margin-bottom: 10px; max-width: 400px; }
        button { padding: 12px 25px; background: #1DB954; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #results { margin-top: 20px; }
        .song-item { background: #282828; margin: 10px auto; padding: 15px; border-radius: 12px; cursor: pointer; max-width: 500px; text-align: left; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>BoB Music Engine 🎧</h1>
    <input type="text" id="query" placeholder="Artiste ou musique...">
    <button onclick="search()">Search</button>
    <div id="results"></div>
    <audio id="player" controls autoplay></audio>

    <script>
        async function search() {
            const q = document.getElementById("query").value;
            const resDiv = document.getElementById("results");
            if (!q) return;
            resDiv.innerHTML = "Searching...";

            // On utilise une liste de secours au cas où l'un des serveurs sature
            const instances = [
                "https://invidious.flokinet.is",
                "https://invidious.drgns.space",
                "https://inv.vern.cc"
            ];

            let success = false;
            for (let url of instances) {
                if (success) break;
                try {
                    const res = await fetch(`${url}/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
                    const songs = await res.json();
                    
                    resDiv.innerHTML = "";
                    songs.forEach(song => {
                        const div = document.createElement("div");
                        div.className = "song-item";
                        div.innerHTML = `<strong>${song.title}</strong><br><small>${song.author}</small>`;
                        div.onclick = () => {
                            document.getElementById("player").src = `${url}/latest_version?id=${song.videoId}&itag=140`;
                        };
                        resDiv.appendChild(div);
                    });
                    success = true;
                } catch (e) {
                    console.log("Serveur suivant...");
                }
            }
            if (!success) resDiv.innerHTML = "Tous les serveurs sont occupés, réessaie.";
        }
    </script>
</body>
</html>
