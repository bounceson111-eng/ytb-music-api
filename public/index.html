<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Music Search</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      li { margin: 10px 0; padding: 10px; background: #f4f4f4; border-radius: 5px; list-style: none; }
    </style>
  </head>
  <body>
    <h1>Rechercher et écouter de la musique</h1>
    <input type="text" id="query" placeholder="Entrez le nom de la chanson..." />
    <button onclick="search()">Recherche</button>

    <ul id="results"></ul>

    <audio id="player" controls autoplay style="width: 100%; margin-top: 20px;"></audio>

    <script>
      async function search() {
        const q = document.getElementById("query").value;
        // BoB : On utilise un moteur de secours direct
        const res = await fetch(`https://inv.vern.cc/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
        const songs = await res.json();

        const list = document.getElementById("results");
        list.innerHTML = "";

        songs.forEach((song) => {
          const li = document.createElement("li");
          li.textContent = `${song.title} - ${song.author}`;
          li.style.cursor = "pointer";

          li.onclick = () => {
            // BoB : Lien audio direct indestructible (itag 140 = audio m4a)
            const audioUrl = `https://inv.vern.cc/latest_version?id=${song.videoId}&itag=140`;
            document.getElementById("player").src = audioUrl;
            document.getElementById("player").play();
          };

          list.appendChild(li);
        });
      }
    </script>
  </body>
</html>
