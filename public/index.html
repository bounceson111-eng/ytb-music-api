<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BoB Music Player</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input { padding: 10px; width: 70%; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #1DB954; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #results { list-style: none; padding: 0; margin-top: 20px; }
        .song-item { background: #282828; margin: 10px auto; padding: 15px; border-radius: 8px; cursor: pointer; max-width: 500px; }
    </style>
</head>
<body>
    <h1>BoB Music Engine 🎧</h1>
    <input type="text" id="query" placeholder="Search artist or song...">
    <button onclick="search()">Search</button>

    <div id="results"></div>
    <audio id="player" controls autoplay style="width: 100%; margin-top: 20px;"></audio>

    <script>
        async function search() {
            const q = document.getElementById("query").value;
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "Searching...";

            try {
                const res = await fetch(`https://inv.vern.cc/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
                const songs = await res.json();
                
                resultsDiv.innerHTML = "";
                songs.forEach(song => {
                    const div = document.createElement("div");
                    div.className = "song-item";
                    div.innerHTML = `<strong>${song.title}</strong><br><small>${song.author}</small>`;
                    
                    div.onclick = () => {
                        const audioUrl = `https://inv.vern.cc/latest_version?id=${song.videoId}&itag=140`;
                        document.getElementById("player").src = audioUrl;
                        document.getElementById("player").play();
                    };
                    resultsDiv.appendChild(div);
                });
            } catch (e) {
                resultsDiv.innerHTML = "Error: Server busy, try again.";
            }
        }
    </script>
</body>
</html>
